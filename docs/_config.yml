# Site settings
title: BashTab
description: Bash CLI framework

# GitHub Pages (project site, deployed from the evagreendev fork):
#   https://evagreendev.github.io/BashTab/
# Note: GitHub Pages' cloud build would auto-inject baseurl for a project site
# anyway; it is set explicitly for local-build parity and portability.
# For local development, serve with: bundle exec jekyll serve --baseurl ''
url: "https://evagreendev.github.io"
baseurl: "/BashTab"

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

# docs/README.md doubles as the GitHub repository README, so it contains no
# Jekyll front matter (GitHub would render it as a table). Its page metadata
# lives here instead. jekyll-readme-index (a github-pages default plugin)
# already promotes README.md to the site root, so no permalink is needed.
defaults:
  - scope:
      path: "README.md"
    values:
      layout: page
      title: About
      nav_order: 1
